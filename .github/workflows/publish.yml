name: Publish Package

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: NPM Publish Job
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      # setup-node ships npm 10; OIDC trusted publishing needs npm >= 11.5.1
      - name: Ensure npm supports OIDC
        run: npm install -g npm@latest
      - run: |
          yarn
          npm run pre:release
          npm run release
